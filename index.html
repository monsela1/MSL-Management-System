<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Amount Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-6 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-4 md:p-6 rounded-xl shadow-md border border-slate-200">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-slate-200 pb-4 gap-4">
            <div>
                <h1 class="text-xl font-bold text-slate-800">តារាងកត់ត្រាទឹកប្រាក់</h1>
                <p class="text-xs text-slate-500 mt-1">ទិន្នន័យរក្សាទុកស្វ័យប្រវត្ត និងទាញចេញជា Excel</p>
            </div>
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button onclick="addRow()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-plus"></i> ថែមឈ្មោះ
                </button>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-file-excel"></i> ទាញជា Excel
                </button>
                <button onclick="clearAllData()" class="bg-rose-50 hover:bg-rose-100 text-rose-600 px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-trash-can"></i> លុបទាំងអស់
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200 shadow-sm">
            <table class="w-full text-left border-collapse bg-white">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 font-semibold text-sm select-none">
                        <th class="p-3 border-r border-slate-200 text-center w-16">ល.រ</th>
                        <th class="p-3 border-r border-slate-200">ឈ្មោះ</th>
                        <th class="p-3 border-r border-slate-200 text-center w-48">ទឹកប្រាក់ ($)</th>
                        <th class="p-3 text-center w-16">លុប</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-slate-600 text-sm divide-y divide-slate-200">
                    </tbody>
                <tfoot>
                    <tr class="bg-slate-100 font-bold text-slate-700 border-t-2 border-slate-300 text-sm select-none">
                        <td colspan="2" class="p-3 border-r border-slate-200 text-right">ទឹកប្រាក់សរុប (Total Amount):</td>
                        <td id="grand-total-amount" class="p-3 border-r border-slate-200 text-center text-emerald-700 bg-emerald-50/50 text-base">$0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        // ទាញទិន្នន័យពី LocalStorage បើគ្មានទេ ដាក់ទិន្នន័យគំរូ ២ ជួរ
        let records = JSON.parse(localStorage.getItem('simple_amount_data')) || [
            { name: "សុខ ភា", amount: 150.00 },
            { name: "ចាន់ ធី", amount: 220.50 }
        ];

        // បង្ហាញទិន្នន័យលើតារាង
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            records.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                tr.innerHTML = `
                    <td class="p-2 border-r border-slate-200 text-center font-medium bg-slate-50/50 select-none">${index + 1}</td>
                    <td class="p-2 border-r border-slate-200">
                        <input type="text" value="${item.name}" onchange="updateData(${index}, 'name', this.value)" placeholder="បញ្ចូលឈ្មោះ..." class="w-full px-2 py-1 border border-transparent hover:border-slate-300 focus:border-blue-500 focus:bg-white rounded outline-none bg-transparent transition">
                    </td>
                    <td class="p-2 border-r border-slate-200 text-center">
                        <input type="number" step="any" value="${item.amount || ''}" oninput="updateData(${index}, 'amount', this.value, true)" placeholder="0.00" class="w-full text-center px-2 py-1 border border-transparent hover:border-slate-300 focus:border-blue-500 focus:bg-white rounded outline-none bg-transparent font-medium text-blue-600 transition">
                    </td>
                    <td class="p-2 text-center">
                        <button onclick="deleteRow(${index})" class="text-rose-500 hover:text-rose-700 p-1 transition cursor-pointer">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            calculateSummary();
            saveToLocalStorage();
        }

        // កែប្រែទិន្នន័យ
        function updateData(index, field, value, isNumber = false) {
            if (isNumber) {
                records[index][field] = parseFloat(value) || 0;
                calculateSummary();
            } else {
                records[index][field] = value;
            }
            saveToLocalStorage();
        }

        // ថែមជួរថ្មី
        function addRow() {
            records.push({ name: "", amount: 0 });
            renderTable();
        }

        // លុបជួរ
        function deleteRow(index) {
            records.splice(index, 1);
            renderTable();
        }

        // លុបទាំងអស់
        function clearAllData() {
            if(confirm("តើបងពិតជាចង់លុបទិន្នន័យទាំងអស់មែនទេ?")) {
                records = [];
                renderTable();
            }
        }

        // គណនាទឹកប្រាក់សរុប
        function calculateSummary() {
            let grandTotal = 0;
            records.forEach(item => {
                grandTotal += item.amount;
            });
            document.getElementById('grand-total-amount').innerText = `$${grandTotal.toFixed(2)}`;
        }

        // Save ចូលសតិចងចាំ Browser
        function saveToLocalStorage() {
            localStorage.setItem('simple_amount_data', JSON.stringify(records));
        }

        // ទាញចេញជា Excel
        function exportToExcel() {
            if(records.length === 0) {
                alert("គ្មានទិន្នន័យសម្រាប់ទាញចេញទេបង!");
                return;
            }

            const excelRows = [["ល.រ", "ឈ្មោះ", "ទឹកប្រាក់ ($)"]];
            let grandTotal = 0;

            records.forEach((item, index) => {
                grandTotal += item.amount;
                excelRows.push([index + 1, item.name, item.amount]);
            });

            excelRows.push(["ទឹកប្រាក់សរុប", "", grandTotal]);

            const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "តារាងទឹកប្រាក់");

            const date = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(workbook, `តារាង_ទឹកប្រាក់_${date}.xlsx`);
        }

        // ដំណើរការតារាងពេលបើក Web ភ្លាម
        renderTable();
    </script>
</body>
</html>
