<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Amount Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-4 md:p-6 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-4 md:p-6 rounded-xl shadow-md border border-slate-200">
        
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-slate-200 pb-4 gap-4">
            <div>
                <h1 class="text-xl font-bold text-slate-800">តារាងកត់ត្រាទឹកប្រាក់ (Cloud Database)</h1>
                <p class="text-xs text-slate-500 mt-1">ទិន្នន័យ Sync គ្នារវាងទូរស័ព្ទទាំងអស់ភ្លាមៗ</p>
            </div>
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <button onclick="addRow()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-plus"></i> ថែមឈ្មោះ
                </button>
                <button onclick="fetchRecords()" class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-rotate"></i> ទាញទិន្នន័យថ្មី (Refresh)
                </button>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg font-medium text-xs flex items-center gap-1.5 transition cursor-pointer">
                    <i class="fa-solid fa-file-excel"></i> ទាញជា Excel
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200 shadow-sm">
            <table class="w-full text-left border-collapse bg-white">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-200 text-slate-700 font-semibold text-sm select-none">
                        <th class="p-3 border-r border-slate-200 text-center w-16">ល.រ</th>
                        <th class="p-3 border-r border-slate-200">ឈ្មោះ</th>
                        <th class="p-3 border-r border-slate-200 text-center w-48">ទឹកប្រាក់ ($)</th>
                        <th class="p-3 text-center w-16">លុប</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-slate-600 text-sm divide-y divide-slate-200">
                    <tr>
                        <td colspan="4" class="p-4 text-center text-slate-400">កំពុងទាញទិន្នន័យពី Cloud...</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr class="bg-slate-100 font-bold text-slate-700 border-t-2 border-slate-300 text-sm select-none">
                        <td colspan="2" class="p-3 border-r border-slate-200 text-right">ទឹកប្រាក់សរុប (Total Amount):</td>
                        <td id="grand-total-amount" class="p-3 border-r border-slate-200 text-center text-emerald-700 bg-emerald-50/50 text-base">$0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vlkswcjpktigfayjgxzd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3zQyZayhIIn4krTv6fUT_A_97TqSiu2';
        
        // កន្លែងនេះបានកែសម្រួលដកសញ្ញា @ ចេញរួចរាល់ហើយបង (supabase.createClient)
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let records = [];

        // មុខងារទាញទិន្នន័យពី Cloud Database មកបង្ហាញ
        async function fetchRecords() {
            const { data, error } = await supabase
                .from('ot_records')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) {
                alert('មានបញ្ហាក្នុងការទាញទិន្នន័យ៖ ' + error.message);
                return;
            }

            records = data;
            renderTable();
        }

        // មុខងារ Render បង្ហាញទិន្នន័យទៅលើតារាង HTML
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-400 select-none">គ្មានទិន្នន័យឡើយ សូមចុចប៊ូតុង "ថែមឈ្មោះ"</td></tr>`;
                calculateSummary();
                return;
            }

            records.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition";
                tr.innerHTML = `
                    <td class="p-2 border-r border-slate-200 text-center font-medium bg-slate-50/50 select-none">${index + 1}</td>
                    <td class="p-2 border-r border-slate-200">
                        <input type="text" value="${item.name || ''}" onchange="updateDatabase(${item.id}, 'name', this.value)" placeholder="បញ្ចូលឈ្មោះ..." class="w-full px-2 py-1 border border-transparent hover:border-slate-300 focus:border-blue-500 focus:bg-white rounded outline-none bg-transparent transition">
                    </td>
                    <td class="p-2 border-r border-slate-200 text-center">
                        <input type="number" step="any" value="${item.amount || ''}" onchange="updateDatabase(${item.id}, 'amount', this.value, true)" placeholder="0.00" class="w-full text-center px-2 py-1 border border-transparent hover:border-slate-300 focus:border-blue-500 focus:bg-white rounded outline-none bg-transparent font-medium text-blue-600 transition">
                    </td>
                    <td class="p-2 text-center">
                        <button onclick="deleteRow(${item.id})" class="text-rose-500 hover:text-rose-700 p-1 transition cursor-pointer" title="លុបជួរនេះ">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            calculateSummary();
        }

        // មុខងារថែមជួរថ្មីទៅក្នុង Cloud Database
        async function addRow() {
            const { data, error } = await supabase
                .from('ot_records')
                .insert([{ name: 'បុគ្គលិកថ្មី', amount: 0 }])
                .select();

            if (error) {
                alert('មិនអាចបន្ថែមទិន្នន័យបានទេ៖ ' + error.message);
            } else {
                fetchRecords(); // ទាញទិន្នន័យថ្មីមកបង្ហាញភ្លាមៗ
            }
        }

        // មុខងារកែប្រែទិន្នន័យនៅលើ Cloud Database
        async function updateDatabase(id, field, value, isNumber = false) {
            const updatedValue = isNumber ? (parseFloat(value) || 0) : value;
            
            const { error } = await supabase
                .from('ot_records')
                .update({ [field]: updatedValue })
                .eq('id', id);

            if (error) {
                alert('ការកែប្រែទិន្នន័យមានកំហុស៖ ' + error.message);
            } else {
                const item = records.find(r => r.id === id);
                if (item) item[field] = updatedValue;
                calculateSummary();
            }
        }

        // មុខងារលុបទិន្នន័យបុគ្គលិកចេញពី Cloud Database
        async function deleteRow(id) {
            if(confirm("តើបងពិតជាចង់លុបទិន្នន័យបុគ្គលិកនេះមែនទេ?")) {
                const { error } = await supabase
                    .from('ot_records')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('មិនអាចលុបបានទេ៖ ' + error.message);
                } else {
                    fetchRecords();
                }
            }
        }

        // មុខងារគណនាផលបូកទឹកប្រាក់សរុប
        function calculateSummary() {
            let grandTotal = 0;
            records.forEach(item => {
                grandTotal += parseFloat(item.amount) || 0;
            });
            document.getElementById('grand-total-amount').innerText = `$${grandTotal.toFixed(2)}`;
        }

        // មុខងារទាញចេញជាហ្វាយ Excel (.xlsx)
        function exportToExcel() {
            if(records.length === 0) {
                alert("គ្មានទិន្នន័យសម្រាប់ទាញចេញទេបង!");
                return;
            }
            const excelRows = [["ល.រ", "ឈ្មោះ", "ទឹកប្រាក់ ($)"]];
            let grandTotal = 0;
            records.forEach((item, index) => {
                grandTotal += parseFloat(item.amount) || 0;
                excelRows.push([index + 1, item.name, item.amount]);
            });
            excelRows.push(["ទឹកប្រាក់សរុប", "", grandTotal]);

            const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "តារាងទឹកប្រាក់ Cloud");
            
            const date = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(workbook, `តារាង_ទឹកប្រាក់_Cloud_${date}.xlsx`);
        }

        // ដំណើរការទាញទិន្នន័យដំបូងបង្អស់ពេលបើកទំព័រ Web ភ្លាម
        fetchRecords();
    </script>
</body>
</html>
